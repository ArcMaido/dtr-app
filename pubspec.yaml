name: dtr_app
description: Daily Time Record App for tracking work hours and tasks.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  path_provider: ^2.1.1
  google_fonts: ^6.2.1
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  csv: ^5.1.1
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.0.2
  android_intent_plus: ^5.3.0
  permission_handler: 12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_logo.png
  adaptive_icon_background: "#183A66"
  adaptive_icon_foreground: assets/branding/DTR-Transparent-Logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/
